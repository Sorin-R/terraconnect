<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e293b">
    Strategic Marketing Automation Funnel
  </text>

  <!-- Funnel Stage 1: Awareness/Lead Capture -->
  <rect x="100" y="60" width="600" height="50" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="4"/>
  <text x="150" y="85" font-size="13" font-weight="bold" fill="#0c4a6e">1. AWARENESS & LEAD CAPTURE</text>
  <text x="520" y="85" font-size="11" fill="#0c4a6e">Forms • Landing Pages • Events</text>

  <!-- Arrow down -->
  <line x1="400" y1="110" x2="400" y2="130" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Funnel Stage 2: Engagement -->
  <rect x="130" y="130" width="540" height="50" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" rx="4"/>
  <text x="180" y="155" font-size="13" font-weight="bold" fill="#3730a3">2. ENGAGEMENT & NURTURING</text>
  <text x="520" y="155" font-size="11" fill="#3730a3">Email Sequences • Dynamic Content</text>

  <!-- Arrow down -->
  <line x1="400" y1="180" x2="400" y2="200" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Funnel Stage 3: Lead Scoring -->
  <rect x="160" y="200" width="480" height="50" fill="#fce7f3" stroke="#db2777" stroke-width="2" rx="4"/>
  <text x="210" y="225" font-size="13" font-weight="bold" fill="#831843">3. LEAD SCORING & QUALIFICATION</text>
  <text x="520" y="225" font-size="11" fill="#831843">AI Scoring • Behavioral Triggers</text>

  <!-- Arrow down -->
  <line x1="400" y1="250" x2="400" y2="270" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Funnel Stage 4: Sales Handoff -->
  <rect x="190" y="270" width="420" height="50" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="4"/>
  <text x="240" y="295" font-size="13" font-weight="bold" fill="#166534">4. SALES HANDOFF & CONVERSION</text>
  <text x="520" y="295" font-size="11" fill="#166534">CRM Sync • Sales Alerts</text>

  <!-- AI Intelligence Badge -->
  <rect x="50" y="340" width="700" height="80" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5" rx="8"/>

  <text x="60" y="360" font-size="12" font-weight="bold" fill="#166534">⚡ AI Intelligence Powers Each Stage</text>

  <rect x="60" y="370" width="150" height="35" fill="#dcfce7" rx="4"/>
  <text x="135" y="388" font-size="10" font-weight="bold" text-anchor="middle" fill="#166534">Smart Timing</text>
  <text x="135" y="400" font-size="9" text-anchor="middle" fill="#166534">Send at optimal time</text>

  <rect x="230" y="370" width="150" height="35" fill="#dcfce7" rx="4"/>
  <text x="305" y="388" font-size="10" font-weight="bold" text-anchor="middle" fill="#166534">Personalization</text>
  <text x="305" y="400" font-size="9" text-anchor="middle" fill="#166534">Tailored messaging</text>

  <rect x="400" y="370" width="150" height="35" fill="#dcfce7" rx="4"/>
  <text x="475" y="388" font-size="10" font-weight="bold" text-anchor="middle" fill="#166534">Prediction</text>
  <text x="475" y="400" font-size="9" text-anchor="middle" fill="#166534">Identify next best action</text>

  <rect x="570" y="370" width="150" height="35" fill="#dcfce7" rx="4"/>
  <text x="645" y="388" font-size="10" font-weight="bold" text-anchor="middle" fill="#166534">Optimization</text>
  <text x="645" y="400" font-size="9" text-anchor="middle" fill="#166534">Continuous learning</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#06B6D4"/>
    </marker>
  </defs>
</svg>