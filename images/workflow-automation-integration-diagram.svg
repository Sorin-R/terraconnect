<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e293b">
    Workflow Automation Integration
  </text>

  <!-- Center Hub -->
  <circle cx="400" cy="240" r="50" fill="#06B6D4" opacity="0.1" stroke="#06B6D4" stroke-width="2"/>
  <text x="400" y="245" font-size="14" font-weight="bold" text-anchor="middle" fill="#0891b2">
    AI Automation
  </text>

  <!-- Left side systems -->
  <!-- CRM box -->
  <rect x="50" y="140" width="120" height="100" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" rx="8"/>
  <text x="110" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#0c4a6e">CRM</text>
  <text x="110" y="185" font-size="11" text-anchor="middle" fill="#0c4a6e">HubSpot</text>
  <text x="110" y="200" font-size="11" text-anchor="middle" fill="#0c4a6e">Salesforce</text>
  <text x="110" y="215" font-size="11" text-anchor="middle" fill="#0c4a6e">Pipedrive</text>

  <!-- Connection line from CRM -->
  <line x1="170" y1="190" x2="350" y2="225" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Email/Communication box -->
  <rect x="50" y="290" width="120" height="100" fill="#fce7f3" stroke="#db2777" stroke-width="2" rx="8"/>
  <text x="110" y="315" font-size="13" font-weight="bold" text-anchor="middle" fill="#831843">Email & Chat</text>
  <text x="110" y="335" font-size="11" text-anchor="middle" fill="#831843">Gmail</text>
  <text x="110" y="350" font-size="11" text-anchor="middle" fill="#831843">Slack</text>
  <text x="110" y="365" font-size="11" text-anchor="middle" fill="#831843">Teams</text>

  <!-- Connection line from Email -->
  <line x1="170" y1="340" x2="350" y2="260" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Right side systems -->
  <!-- Finance box -->
  <rect x="630" y="140" width="120" height="100" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="8"/>
  <text x="690" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#166534">Finance</text>
  <text x="690" y="185" font-size="11" text-anchor="middle" fill="#166534">Stripe</text>
  <text x="690" y="200" font-size="11" text-anchor="middle" fill="#166534">QuickBooks</text>
  <text x="690" y="215" font-size="11" text-anchor="middle" fill="#166534">Xero</text>

  <!-- Connection line from Finance -->
  <line x1="630" y1="190" x2="450" y2="225" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Data/Project Management box -->
  <rect x="630" y="290" width="120" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="690" y="315" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400e">Data & Projects</text>
  <text x="690" y="335" font-size="11" text-anchor="middle" fill="#92400e">Airtable</text>
  <text x="690" y="350" font-size="11" text-anchor="middle" fill="#92400e">Notion</text>
  <text x="690" y="365" font-size="11" text-anchor="middle" fill="#92400e">Asana</text>

  <!-- Connection line from Data -->
  <line x1="630" y1="340" x2="450" y2="260" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Benefits at bottom -->
  <rect x="80" y="410" width="200" height="25" fill="#e0e7ff" rx="4"/>
  <text x="180" y="427" font-size="11" text-anchor="middle" fill="#3730a3">⚡ Faster Operations</text>

  <rect x="300" y="410" width="200" height="25" fill="#f0fdf4" rx="4"/>
  <text x="400" y="427" font-size="11" text-anchor="middle" fill="#166534">✓ Fewer Errors</text>

  <rect x="520" y="410" width="200" height="25" fill="#fdf2f8" rx="4"/>
  <text x="620" y="427" font-size="11" text-anchor="middle" fill="#831843">📊 Better Visibility</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#06B6D4"/>
    </marker>
  </defs>
</svg>